<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Phonics Quest — Year 1 拼音特訓</title>
  <meta name="description" content="Year 1 Phonics Screening Check 拼音特訓 — 錄音、聽自己讀音、聽正確讀音。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Baloo+2:wght@500;600;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ===================== LOGIN GATE ===================== -->
  <div id="gate" class="gate">
    <div class="gate__card">
      <div class="gate__logo">🚀</div>
      <h1 class="gate__title">Phonics Quest</h1>
      <p class="gate__subtitle">Year 1 拼音特訓<br /><span>限受邀好友 · invite only</span></p>
      <div class="gate__gsi">
        <button id="signinBtn" class="gbtn">
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
          <span>Sign in with Google</span>
        </button>
      </div>
      <p id="gateMsg" class="gate__msg"></p>
      <p class="gate__hint">用 Google 帳戶登入。只有受邀請的帳戶先可以入。</p>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <main class="app">
    <header class="topbar">
      <div class="brand">🚀 Phonics&nbsp;Quest</div>
      <button class="iconbtn" id="signoutBtn" title="登出">登出 ⎋</button>
    </header>

    <div class="meta">
      <span id="progress" class="meta__progress">題目 1 / 40</span>
      <span id="year" class="chip">—</span>
    </div>
    <div class="progress"><div class="progress__fill" id="progressFill"></div></div>

    <!-- Word card -->
    <section class="card" id="card" data-type="alien">
      <span class="card__badge" id="category">怪獸字 👽</span>
      <span class="card__emoji" id="emoji">👽</span>
      <div class="card__word" id="word">…</div>
    </section>

    <!-- Training panel -->
    <section class="panel">
      <p class="panel__title" id="status">錄音特訓：準備就緒</p>
      <div class="panel__grid">
        <button class="btn btn--rec" id="recordBtn">🎙️ 開始錄音</button>
        <button class="btn btn--own" id="playOwnBtn" disabled>▶️ 聽自己讀音</button>
        <button class="btn btn--say" id="speakBtn">🔊 聽正確讀音</button>
        <button class="btn btn--seg" id="segmentBtn">🧩 聽拆音</button>
      </div>
    </section>

    <!-- Navigation -->
    <nav class="nav">
      <button class="btn btn--nav" id="prevBtn">⬅️ 上一個</button>
      <button class="btn btn--shuffle" id="shuffleBtn" title="洗牌">🔀</button>
      <button class="btn btn--nav" id="nextBtn">下一個 ➡️</button>
    </nav>

    <footer class="footnote">
      Year 1 Phonics Screening Check · Read Write Inc.<br />
      字庫來源：<a href="https://www.primarytools.co.uk/phonics-check-year-1-and-year-2/" target="_blank" rel="noopener">primarytools.co.uk</a>
    </footer>
  </main>

  <!-- Firebase (compat SDK — keeps plain <script>, no modules) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="js/gate.js"></script>
  <script src="js/words.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
